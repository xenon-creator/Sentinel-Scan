name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Secret scanning runs first — fail fast before anything else ──────────────
  secret-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0  # full history so gitleaks can scan all commits in a PR

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # GITLEAKS_LICENSE is only needed for paid org-level scans;
        # for public repos / personal use this is not required.

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    needs: secret-scan          # don't bother if secrets were found
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Lint with flake8
      run: |
        flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=backend/venv
        flake8 backend/ --count --max-complexity=10 --max-line-length=127 --statistics --exclude=backend/venv

    - name: Run Backend Tests
      run: |
        PYTHONPATH=. SECRET_KEY=ci_dummy_key pytest backend/

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-tests:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        cd dashboard/frontend
        npm install

    - name: Run ESLint
      run: |
        cd dashboard/frontend
        npm run lint --if-present

  # ── Docker build verification ─────────────────────────────────────────────────
  docker-build-verification:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
    - uses: actions/checkout@v3

    - name: Create .env from example
      run: cp .env.example .env

    - name: Verify Docker Compose Build
      run: |
        docker compose config
        docker compose build
