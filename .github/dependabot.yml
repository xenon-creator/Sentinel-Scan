version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    assignees:
      - "CosmicAlgo" # Assuming this is your GitHub handle based on your email. Adjust if different.

  - package-ecosystem: "npm"
    directory: "/dashboard/frontend"
    schedule:
      interval: "weekly"
    assignees:
      - "CosmicAlgo"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - "CosmicAlgo"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    assignees:
      - "CosmicAlgo"
